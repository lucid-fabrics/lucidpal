name: PocketMind
options:
  bundleIdPrefix: app.pocketmind
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  swift: "6.0"

packages:
  llama:
    path: ./Packages/llama

targets:
  PocketMind:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pocketmind
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: Sources/App/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "KRPUAN3FFA"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: llama
        product: llama
    entitlements:
      path: Sources/App/PocketMind.entitlements
      properties: {}

  PocketMindTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: app.pocketmind.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "KRPUAN3FFA"
    dependencies:
      - target: PocketMind

schemes:
  PocketMind:
    build:
      targets:
        PocketMind: all
        PocketMindTests: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PocketMindTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
