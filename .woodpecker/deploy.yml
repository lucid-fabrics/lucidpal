when:
  - event: push
    branch: main
  - event: manual

labels:
  platform: linux

steps:
  - name: build-and-deploy
    image: node:22
    environment:
      CLOUDFLARE_API_TOKEN:
        from_secret: CLOUDFLARE_API_TOKEN
      CLOUDFLARE_ACCOUNT_ID:
        from_secret: CLOUDFLARE_ACCOUNT_ID
    commands:
      - npm install --legacy-peer-deps
      - npm run build
      - npx wrangler pages deploy build --project-name lucidpal-docs --branch main

  - name: notify_result
    image: bash
    when:
      - status: [success, failure]
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: TELEGRAM_BOT_TOKEN
      TELEGRAM_CHAT_ID:
        from_secret: TELEGRAM_CHAT_ID
    commands:
      - apk add --no-cache curl
      - |
        if [ "$CI_PIPELINE_STATUS" = "success" ]; then TG_EMOJI="✅"; else TG_EMOJI="❌"; fi
        COMMIT_SHORT="${CI_COMMIT_SHA:0:7}"
        COMMIT_BRANCH=$(printf '%s' "$CI_COMMIT_BRANCH" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
        COMMIT_AUTHOR=$(printf '%s' "$CI_COMMIT_AUTHOR" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
        COMMIT_MSG=$(printf '%s' "$CI_COMMIT_MESSAGE" | head -1 | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
        MSG=$(printf '📚 <b>LucidPal Docs</b> — %s\n\n🌿 <code>%s</code>\n🔖 <code>%s</code> · %s\n📝 %s\n\n🔗 %s' \
          "$TG_EMOJI" "$COMMIT_BRANCH" "$COMMIT_SHORT" "$COMMIT_AUTHOR" "$COMMIT_MSG" "$CI_PIPELINE_URL")
        curl -s --max-time 30 -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}&parse_mode=HTML&disable_web_page_preview=true" \
          --data-urlencode "text=$MSG" || true
